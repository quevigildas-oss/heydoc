name: Dokita Test Bot

on:
  workflow_dispatch:
    inputs:
      disease:
        description: 'Maladie spécifique (ex: M1) — vide = toutes'
        required: false
        default: ''
      start:
        description: 'Maladie de départ pour reprise (ex: M39) — vide = depuis M1'
        required: false
        default: ''
      resume:
        description: 'Run ID à reprendre (pour rapport complet) — vide = nouveau run'
        required: false
        default: ''
      quick:
        description: 'Mode rapide (5 maladies)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      no_cleanup:
        description: 'Conserver données (debug)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run Dokita Test Bot
        env:
          DOKITA_KEY: ${{ secrets.DOKITA_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          TEST_PATIENT_EMAIL: ${{ secrets.TEST_PATIENT_EMAIL }}
          TEST_PATIENT_CODE: ${{ secrets.TEST_PATIENT_CODE }}
          TEST_MEDECIN_ORDRE: ${{ secrets.TEST_MEDECIN_ORDRE }}
          TEST_MEDECIN_CODE: ${{ secrets.TEST_MEDECIN_CODE }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.disease }}" ]; then
            ARGS="$ARGS --disease=${{ github.event.inputs.disease }}"
          fi
          if [ -n "${{ github.event.inputs.start }}" ]; then
            ARGS="$ARGS --start=${{ github.event.inputs.start }}"
          fi
          if [ -n "${{ github.event.inputs.resume }}" ]; then
            ARGS="$ARGS --resume=${{ github.event.inputs.resume }}"
          fi
          if [ "${{ github.event.inputs.quick }}" = "true" ]; then
            ARGS="$ARGS --quick"
          fi
          if [ "${{ github.event.inputs.no_cleanup }}" = "true" ]; then
            ARGS="$ARGS --no-cleanup"
          fi
          python3 tests/bot.py $ARGS

      - name: Upload rapports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-${{ github.run_id }}
          path: |
            rapport.html
            rapport.json
            rapport.xlsx
          retention-days: 90

      - name: Résumé GitHub
        if: always()
        run: |
          echo "## Dokita Test Bot — Résumé" >> $GITHUB_STEP_SUMMARY
          echo "Run ID : ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          if [ -f rapport.json ]; then
            PASS=$(python3 -c "import json; d=json.load(open('rapport.json')); print(sum(1 for r in d['results'] if r.get('result')=='PASS'))")
            FAIL=$(python3 -c "import json; d=json.load(open('rapport.json')); print(sum(1 for r in d['results'] if r.get('result')=='FAIL'))")
            TOTAL=$(python3 -c "import json; d=json.load(open('rapport.json')); print(len(d['results']))")
            echo "| Métrique | Valeur |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ PASS  | $PASS  |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ FAIL  | $FAIL  |" >> $GITHUB_STEP_SUMMARY
            echo "| Total    | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          fi
