<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dokita — Réponse Pharmacie</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#f0fdf4;color:#1A2B3C;min-height:100vh;}
.hdr{background:#0A7E6A;padding:16px 20px;display:flex;align-items:center;gap:12px;}
.hdr-logo{font-size:20px;font-weight:800;color:#fff;letter-spacing:1px;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px;}
.container{max-width:600px;margin:0 auto;padding:16px;}
.card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:14px;border:1px solid #e5e7eb;}
.card-hdr{background:#0A7E6A;padding:10px 14px;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:space-between;}
.card-body{padding:14px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-box{background:#E8F5F2;border:1px solid #0A7E6A;border-radius:8px;padding:10px;}
.info-lbl{font-size:9px;font-weight:700;color:#0A7E6A;margin-bottom:4px;}
.info-val{font-size:13px;font-weight:700;}
.med-row{border-bottom:1px solid #e5e7eb;padding:14px 0;}
.med-row:last-child{border-bottom:none;}
.med-name{font-size:14px;font-weight:700;color:#1A2B3C;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.med-num{width:24px;height:24px;border-radius:50%;background:#0A7E6A;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.check-total{display:flex;align-items:center;gap:8px;background:#f0fdf4;border:1.5px solid #0A7E6A;border-radius:8px;padding:8px 12px;cursor:pointer;margin-bottom:10px;font-size:13px;font-weight:700;color:#0A7E6A;}
.check-total input[type=checkbox]{width:18px;height:18px;accent-color:#0A7E6A;cursor:pointer;}
.med-fields-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;align-items:end;}
.field-group{display:flex;flex-direction:column;gap:3px;}
.field-lbl{font-size:9px;font-weight:700;color:#6B7280;text-transform:uppercase;}
.field-input{border:1px solid #D1D5DB;border-radius:6px;padding:7px 10px;font-size:13px;width:100%;outline:none;}
.field-input:focus{border-color:#0A7E6A;}
.field-input.total-auto{background:#f0fdf4;border-color:#86efac;color:#0A7E6A;font-weight:700;}
.field-input:disabled{background:#f9fafb;color:#9CA3AF;}
.btn-submit{width:100%;padding:16px;background:#0A7E6A;border:none;border-radius:12px;font-family:Arial,sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;margin-top:8px;}
.btn-submit:active{background:#085f50;}
.btn-submit:disabled{background:#9CA3AF;cursor:not-allowed;}
.btn-secondary{width:100%;padding:13px;background:#fff;border:2px solid #0A7E6A;border-radius:12px;font-family:Arial,sans-serif;font-size:14px;font-weight:700;color:#0A7E6A;cursor:pointer;margin-top:10px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A2B3C;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;display:none;z-index:999;}
.loading{text-align:center;padding:60px 20px;color:#6B7280;}
.error{background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:20px;text-align:center;color:#dc2626;margin:20px 0;}
.success{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:24px;text-align:center;margin:20px 0;}
.success-ico{font-size:48px;margin-bottom:12px;}
.success-title{font-size:18px;font-weight:700;color:#0A7E6A;margin-bottom:8px;}
.success-sub{font-size:13px;color:#6B7280;line-height:1.6;}
.pharm-field{margin-bottom:12px;}
.pharm-field label{display:block;font-size:11px;font-weight:700;color:#6B7280;margin-bottom:4px;text-transform:uppercase;}
.pharm-field input{width:100%;border:1px solid #D1D5DB;border-radius:8px;padding:10px 14px;font-size:14px;outline:none;}
.pharm-field input:focus{border-color:#0A7E6A;}
/* Code retrait */
.code-box{background:#0A7E6A;border-radius:16px;padding:24px;text-align:center;margin:16px 0;}
.code-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
.code-val{font-size:52px;font-weight:800;color:#fff;letter-spacing:12px;font-family:monospace;}
.code-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:12px;line-height:1.5;}
/* Saisie code retrait */
.retrait-box{background:#fff;border:2px solid #0A7E6A;border-radius:12px;padding:20px;margin:16px 0;}
.retrait-title{font-size:15px;font-weight:700;color:#0A7E6A;margin-bottom:12px;text-align:center;}
.retrait-input{width:100%;border:2px solid #D1D5DB;border-radius:10px;padding:14px;font-size:28px;font-weight:800;letter-spacing:8px;text-align:center;color:#1A2B3C;outline:none;font-family:monospace;}
.retrait-input:focus{border-color:#0A7E6A;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-ok{background:#dcfce7;color:#15803d;}
.badge-pending{background:#fef9c3;color:#854d0e;}
.badge-done{background:#dbeafe;color:#1d4ed8;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-logo">DOKITA PRO</div>
    <div class="hdr-sub" id="hdrSub">Appel d'offre pharmacie</div>
  </div>
</div>
<div class="container">
  <div id="mainContent"><div class="loading">⏳ Chargement...</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
var DOKITA_PROXY='https://heydoc-medecin.vercel.app/api/notion';
var NOTION_AO_DB='321dce21-e1d3-8002-a444-eb58cc33287f';
var params=new URLSearchParams(window.location.search);
var aoId=params.get('id');
var pharmTel=params.get('tel')||'';
var aoData=null;
var STATE=''; // 'form' | 'confirme' | 'retrait_attente' | 'valide'

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(function(){t.style.display='none';},3000);
}
function escHtml(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function notionReq(endpoint,method,body){
  var url=DOKITA_PROXY+'?path='+encodeURIComponent(endpoint);
  var opts={method:method||'GET',headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  var r=await fetch(url,opts);
  if(!r.ok)throw new Error('Notion '+r.status);
  return await r.json();
}

async function init(){
  var el=document.getElementById('mainContent');
  if(!aoId){el.innerHTML='<div class="error">❌ Lien invalide.</div>';return;}
  try{
    var res=await notionReq('/databases/'+NOTION_AO_DB+'/query','POST',{
      filter:{property:'ID',title:{equals:aoId}}
    });
    if(!res.results||!res.results.length){
      el.innerHTML='<div class="error">❌ Appel d\'offre introuvable ou expiré.</div>';return;
    }
    var page=res.results[0];
    var props=page.properties;
    function txt(k){var p=props[k];if(!p)return '';
      if(p.type==='rich_text')return(p.rich_text||[]).map(function(x){return x.plain_text;}).join('');
      if(p.type==='title')return(p.title||[]).map(function(x){return x.plain_text;}).join('');
      if(p.type==='select')return p.select?p.select.name:'';
      if(p.type==='number')return p.number!=null?String(p.number):'';
      return '';}

    var statut=txt('Statut');
    var codeRetraitRaw=txt('Code retrait');
    // Format : "CODE|med1,med2" ou juste "CODE"
    var codeRetraitParts=codeRetraitRaw.split('|');
    var codeRetrait=codeRetraitParts[0];
    var medsAttribues=codeRetraitParts[1]?codeRetraitParts[1].split(','):null;
    var allMeds=JSON.parse(txt('Medicaments')||'[]');
    // Si médicaments attribués → filtrer l'ordonnance
    var medsAffiches=medsAttribues
      ?allMeds.filter(function(m){return medsAttribues.some(function(ma){return m.indexOf(ma.trim())>=0||ma.trim().indexOf(m)>=0;});})
      :allMeds;

    aoData={
      notionPageId:page.id,
      aoId:aoId,
      pharmTel:pharmTel,
      consultId:txt('Consultation ID'),
      patientId:txt('Patient ID'),
      pharmNom:txt('Pharmacie Nom'),
      meds:medsAffiches,
      medsAttribues:medsAttribues,
      statut:statut,
      codeRetrait:codeRetrait,
      offre:txt('Offre JSON')?JSON.parse(txt('Offre JSON')):null
    };

    // Routage selon statut
    if(statut==='valide'){
      renderValide();
    } else if(statut==='selectionne'){
      // Pharmacie sélectionnée → afficher code retrait + saisie
      renderSelectionne();
    } else if(statut==='repondu'){
      // Déjà soumis → montrer confirmation + bouton retour formulaire
      renderDejaRepondu();
    } else {
      renderForm();
    }
  }catch(e){
    el.innerHTML='<div class="error">❌ Erreur : '+e.message+'</div>';
  }
}

function renderForm(){
  STATE='form';
  var d=aoData;
  var medsHtml=d.meds.map(function(m,i){
    return '<div class="med-row" id="med_row_'+i+'">'+
      '<div class="med-name"><div class="med-num">'+(i+1)+'</div>'+escHtml(m)+'</div>'+
      '<label class="check-total">'+
        '<input type="checkbox" id="total_'+i+'" onchange="toggleTotal('+i+')">'+
        '✅ Totalité disponible'+
      '</label>'+
      '<div class="med-fields-grid">'+
        '<div class="field-group"><div class="field-lbl">📦 Boîtes</div>'+
          '<input class="field-input" type="number" id="boites_'+i+'" min="0" placeholder="0" oninput="calcTotal('+i+')"></div>'+
        '<div class="field-group"><div class="field-lbl">💊 Cp. partiel</div>'+
          '<input class="field-input" type="number" id="comprimes_'+i+'" min="0" placeholder="0"></div>'+
        '<div class="field-group"><div class="field-lbl">💰 Prix/boîte</div>'+
          '<input class="field-input" type="number" id="prix_'+i+'" min="0" placeholder="0" oninput="calcTotal('+i+')"></div>'+
        '<div class="field-group"><div class="field-lbl">🟰 Total FCFA</div>'+
          '<input class="field-input total-auto" type="text" id="total_fcfa_'+i+'" placeholder="—" readonly></div>'+
      '</div>'+
    '</div>';
  }).join('');

  document.getElementById('mainContent').innerHTML=
    '<div class="card">'+
      '<div class="card-hdr">📋 ORDONNANCE #'+d.aoId+'</div>'+
      '<div class="card-body">'+
        '<div class="info-grid">'+
          '<div class="info-box"><div class="info-lbl">PHARMACIE</div><div class="info-val">'+escHtml(d.pharmNom||'—')+'</div></div>'+
          '<div class="info-box"><div class="info-lbl">STATUT</div><div class="info-val"><span class="badge badge-pending">En attente</span></div></div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-hdr">🏪 VOS INFORMATIONS</div>'+
      '<div class="card-body">'+
        '<div class="pharm-field"><label>Nom de la pharmacie</label><input id="pharmNom" type="text" value="'+escHtml(d.pharmNom)+'"></div>'+
        '<div class="pharm-field"><label>Téléphone</label><input id="pharmTel" type="tel" value="'+escHtml(d.pharmTel)+'"></div>'+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-hdr">💊 MÉDICAMENTS</div>'+
      '<div class="card-body">'+medsHtml+'</div>'+
    '</div>'+
    '<button class="btn-submit" onclick="soumettre()">✅ Soumettre mon offre</button>'+
    '<div style="height:30px;"></div>';
}

function renderDejaRepondu(){
  STATE='confirme';
  var d=aoData;
  var medsHtml=(d.offre||[]).map(function(o,i){
    return '<div style="padding:10px 0;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;">'+
      '<div style="font-size:13px;font-weight:600;">'+escHtml(o.medicament)+'</div>'+
      '<div style="text-align:right;font-size:12px;color:#6B7280;">'+
        (o.disponible?'<span class="badge badge-ok">✅ '+o.boites+' boîte(s)</span>':'<span class="badge" style="background:#fee2e2;color:#dc2626;">❌ Indisponible</span>')+
        (o.total?' · <strong>'+o.total.toLocaleString('fr-FR')+' FCFA</strong>':'')+
      '</div>'+
    '</div>';
  }).join('');

  document.getElementById('mainContent').innerHTML=
    '<div class="success">'+
      '<div class="success-ico">📤</div>'+
      '<div class="success-title">Offre soumise</div>'+
      '<div class="success-sub">Votre offre a été transmise.<br>En attente de sélection par le patient.</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-hdr">📋 VOTRE OFFRE<span class="badge badge-pending" style="font-size:10px;">En attente</span></div>'+
      '<div class="card-body">'+medsHtml+'</div>'+
    '</div>'+
    '<button class="btn-secondary" onclick="renderForm()">✏️ Modifier mon offre</button>'+
    '<div style="height:30px;"></div>';
}

function renderSelectionne(){
  STATE='retrait_attente';
  var d=aoData;
  document.getElementById('hdrSub').textContent='Retrait client en attente';
  var medsHtml='';
  if(d.medsAttribues&&d.medsAttribues.length){
    medsHtml='<div class="card">'+
      '<div class="card-hdr">💊 MÉDICAMENTS À PRÉPARER POUR CE CLIENT</div>'+
      '<div class="card-body">'+
        d.medsAttribues.map(function(m,i){
          return '<div style="padding:8px 0;border-bottom:1px solid #e5e7eb;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;">'+
            '<div class="med-num">'+(i+1)+'</div>'+escHtml(m.trim())+
          '</div>';
        }).join('')+
      '</div>'+
    '</div>';
  }
  document.getElementById('mainContent').innerHTML=
    '<div class="success">'+
      '<div class="success-ico">🎯</div>'+
      '<div class="success-title">Votre offre a été sélectionnée !</div>'+
      '<div class="success-sub">Le patient vient récupérer sa commande.<br>Préparez les médicaments ci-dessous.</div>'+
    '</div>'+
    medsHtml+
    (d.codeRetrait?
      '<div class="code-box">'+
        '<div class="code-lbl">Code de retrait patient</div>'+
        '<div class="code-val">'+d.codeRetrait+'</div>'+
        '<div class="code-sub">Le patient vous communique ce code.<br>Vérifiez-le ci-dessous avant de remettre la commande.</div>'+
      '</div>'
    :'')+
    '<div class="retrait-box">'+
      '<div class="retrait-title">🔐 Saisir le code du patient</div>'+
      '<input class="retrait-input" id="codeRetraitInput" type="text" inputmode="numeric" maxlength="6" placeholder="——————">'+
      '<div id="retraitErr" style="color:#dc2626;font-size:12px;text-align:center;margin-top:8px;display:none;"></div>'+
    '</div>'+
    '<button class="btn-submit" onclick="validerRetrait()">✅ Valider le retrait</button>'+
    '<div style="height:30px;"></div>';
}

function renderValide(){
  STATE='valide';
  document.getElementById('hdrSub').textContent='Commande validée';
  document.getElementById('mainContent').innerHTML=
    '<div class="success">'+
      '<div class="success-ico">✅</div>'+
      '<div class="success-title">Retrait validé !</div>'+
      '<div class="success-sub">La commande a été remise au patient.<br>Cette offre est maintenant clôturée.</div>'+
    '</div>';
}

function toggleTotal(i){
  var checked=document.getElementById('total_'+i).checked;
  if(checked){
    document.getElementById('boites_'+i).value=1;
    document.getElementById('comprimes_'+i).value=0;
    calcTotal(i);
  } else {
    document.getElementById('boites_'+i).value='';
    document.getElementById('comprimes_'+i).value='';
    document.getElementById('total_fcfa_'+i).value='';
  }
}

function calcTotal(i){
  var boites=parseInt(document.getElementById('boites_'+i).value||'0')||0;
  var prix=parseInt(document.getElementById('prix_'+i).value||'0')||0;
  var el=document.getElementById('total_fcfa_'+i);
  el.value=boites*prix>0?(boites*prix).toLocaleString('fr-FR')+' FCFA':'';
}

async function soumettre(){
  if(!aoData)return;
  var nom=(document.getElementById('pharmNom').value||'').trim();
  var tel=(document.getElementById('pharmTel').value||'').trim();
  if(!nom||!tel){toast('⚠️ Remplissez le nom et téléphone');return;}
  var auMoinsUn=aoData.meds.some(function(m,i){
    return parseInt(document.getElementById('boites_'+i).value||'0')>0;
  });
  if(!auMoinsUn){toast('⚠️ Renseignez au moins un médicament');return;}
  var offre=aoData.meds.map(function(m,i){
    var boites=parseInt(document.getElementById('boites_'+i).value||'0')||0;
    var comprimes=parseInt(document.getElementById('comprimes_'+i).value||'0')||0;
    var prix=parseInt(document.getElementById('prix_'+i).value||'0')||0;
    return {medicament:m,disponible:boites>0,boites:boites,comprimes:comprimes,prixUnitaire:prix,total:boites*prix};
  });
  var btn=document.querySelector('.btn-submit');
  btn.disabled=true;btn.textContent='⏳ Envoi...';
  try{
    await notionReq('/pages/'+aoData.notionPageId,'PATCH',{
      properties:{
        'Pharmacie Nom':{rich_text:[{text:{content:nom}}]},
        'Pharmacie Tel':{rich_text:[{text:{content:tel}}]},
        'Offre JSON':{rich_text:[{text:{content:JSON.stringify(offre).slice(0,2000)}}]},
        'Statut':{select:{name:'repondu'}},
        'Date reponse':{date:{start:new Date().toISOString()}}
      }
    });
    aoData.offre=offre;
    aoData.statut='repondu';
    renderDejaRepondu();
  }catch(e){
    btn.disabled=false;btn.textContent='✅ Soumettre mon offre';
    toast('❌ Erreur : '+e.message);
  }
}

async function validerRetrait(){
  var code=(document.getElementById('codeRetraitInput').value||'').trim();
  var errEl=document.getElementById('retraitErr');
  errEl.style.display='none';
  if(!/^\d{6}$/.test(code)){
    errEl.textContent='Code invalide — 6 chiffres requis';errEl.style.display='block';return;
  }
  if(aoData.codeRetrait&&code!==aoData.codeRetrait){
    errEl.textContent='Code incorrect — vérifiez avec le patient';errEl.style.display='block';return;
  }
  var btn=document.querySelector('.btn-submit');
  btn.disabled=true;btn.textContent='⏳ Validation...';
  try{
    await notionReq('/pages/'+aoData.notionPageId,'PATCH',{
      properties:{
        'Statut':{select:{name:'valide'}},
        'Date validation':{date:{start:new Date().toISOString()}}
      }
    });
    renderValide();
  }catch(e){
    btn.disabled=false;btn.textContent='✅ Valider le retrait';
    toast('❌ Erreur : '+e.message);
  }
}

init();
</script>
</body>
</html>
