<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dokita — Réponse Pharmacie</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#f0fdf4;color:#1A2B3C;min-height:100vh;}
.hdr{background:#0A7E6A;padding:16px 20px;display:flex;align-items:center;gap:12px;}
.hdr-logo{font-size:20px;font-weight:800;color:#fff;letter-spacing:1px;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px;}
.container{max-width:600px;margin:0 auto;padding:16px;}
.card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:14px;border:1px solid #e5e7eb;}
.card-hdr{background:#0A7E6A;padding:10px 14px;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:space-between;}
.card-body{padding:14px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-box{background:#E8F5F2;border:1px solid #0A7E6A;border-radius:8px;padding:10px;}
.info-lbl{font-size:9px;font-weight:700;color:#0A7E6A;margin-bottom:4px;}
.info-val{font-size:13px;font-weight:700;}
.med-row{border-bottom:1px solid #e5e7eb;padding:14px 0;}
.med-row:last-child{border-bottom:none;}
.med-name{font-size:14px;font-weight:700;color:#1A2B3C;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.med-num{width:24px;height:24px;border-radius:50%;background:#0A7E6A;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.check-total{display:flex;align-items:center;gap:8px;background:#f0fdf4;border:1.5px solid #0A7E6A;border-radius:8px;padding:8px 12px;cursor:pointer;margin-bottom:10px;font-size:13px;font-weight:700;color:#0A7E6A;}
.check-total input[type=checkbox]{width:18px;height:18px;accent-color:#0A7E6A;cursor:pointer;}
.med-fields-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;align-items:end;}
.field-group{display:flex;flex-direction:column;gap:3px;}
.field-lbl{font-size:9px;font-weight:700;color:#6B7280;text-transform:uppercase;}
.field-input{border:1px solid #D1D5DB;border-radius:6px;padding:7px 10px;font-size:13px;width:100%;outline:none;}
.field-input:focus{border-color:#0A7E6A;}
.field-input.total-auto{background:#f0fdf4;border-color:#86efac;color:#0A7E6A;font-weight:700;}
.field-input:disabled{background:#f9fafb;color:#9CA3AF;}
.btn-submit{width:100%;padding:16px;background:#0A7E6A;border:none;border-radius:12px;font-family:Arial,sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;margin-top:8px;}
.btn-submit:active{background:#085f50;}
.btn-submit:disabled{background:#9CA3AF;cursor:not-allowed;}
.btn-secondary{width:100%;padding:13px;background:#fff;border:2px solid #0A7E6A;border-radius:12px;font-family:Arial,sans-serif;font-size:14px;font-weight:700;color:#0A7E6A;cursor:pointer;margin-top:10px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A2B3C;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;display:none;z-index:999;}
.loading{text-align:center;padding:60px 20px;color:#6B7280;}
.error{background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:20px;text-align:center;color:#dc2626;margin:20px 0;}
.success{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:24px;text-align:center;margin:20px 0;}
.success-ico{font-size:48px;margin-bottom:12px;}
.success-title{font-size:18px;font-weight:700;color:#0A7E6A;margin-bottom:8px;}
.success-sub{font-size:13px;color:#6B7280;line-height:1.6;}
.pharm-field{margin-bottom:12px;}
.pharm-field label{display:block;font-size:11px;font-weight:700;color:#6B7280;margin-bottom:4px;text-transform:uppercase;}
.pharm-field input{width:100%;border:1px solid #D1D5DB;border-radius:8px;padding:10px 14px;font-size:14px;outline:none;}
.pharm-field input:focus{border-color:#0A7E6A;}
.retrait-box{background:#fff;border:2px solid #0A7E6A;border-radius:12px;padding:20px;margin:16px 0;}
.retrait-title{font-size:15px;font-weight:700;color:#0A7E6A;margin-bottom:12px;text-align:center;}
.retrait-input{width:100%;border:2px solid #D1D5DB;border-radius:10px;padding:14px;font-size:28px;font-weight:800;letter-spacing:8px;text-align:center;color:#1A2B3C;outline:none;font-family:monospace;}
.retrait-input:focus{border-color:#0A7E6A;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-logo">DOKITA PRO</div>
    <div class="hdr-sub" id="hdrSub">Appel d'offre pharmacie</div>
  </div>
</div>
<div class="container">
  <div id="mainContent"><div class="loading">⏳ Chargement...</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
var DB_URL='https://heydoc-medecin.vercel.app/api/db';
var DOKITA_KEY='dk-2026-prod-x9f7m';
var params=new URLSearchParams(window.location.search);
var aoId=params.get('id');
var pharmTel=params.get('tel')||'';
var aoData=null;
var STATE='';

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(function(){t.style.display='none';},3000);
}
function escHtml(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function dbReq(method,body,qs){
  var url=DB_URL+(qs?'?'+qs:'');
  // Pour PATCH : extraire table et id du body et les mettre en query params
  if(method==='PATCH'&&body&&body.table){
    var q='table='+body.table+(body.id?'&id='+body.id:'');
    url=DB_URL+'?'+q;
    body=body.data||body;
  }
  var opts={method:method||'GET',headers:{'Content-Type':'application/json','x-dokita-key':DOKITA_KEY}};
  if(body)opts.body=JSON.stringify(body);
  var r=await fetch(url,opts);
  if(!r.ok)throw new Error('DB '+r.status);
  return await r.json();
}

async function init(){
  var el=document.getElementById('mainContent');
  if(!aoId){el.innerHTML='<div class="error">❌ Lien invalide.</div>';return;}
  try{
    var data=await dbReq('GET',null,'table=appels_offres&filter=ao_id=eq.'+encodeURIComponent(aoId));
    var rows=Array.isArray(data)?data:(data.data||[]);
    if(!rows.length){el.innerHTML='<div class="error">❌ Appel d\'offre introuvable ou expiré.</div>';return;}
    var row=rows[0];
    var statut=row.statut||'en_attente';
    var codeRetrait=(row.code_retrait||'').trim().replace(/\s/g,'').replace(/[^\d]/g,'');
    var allMeds=[];
    try{allMeds=typeof row.medicaments==='string'?JSON.parse(row.medicaments):(row.medicaments||[]);}catch(e){}
    var offreJson=null;
    try{offreJson=typeof row.offre_json==='string'?JSON.parse(row.offre_json):(row.offre_json||null);}catch(e){}

    aoData={
      supabaseId:row.id,
      aoId:aoId,
      pharmTel:pharmTel||row.pharmacie_tel||'',
      consultId:row.consultation_id||'',
      patientId:row.patient_id||'',
      pharmNom:row.pharmacie_nom||'',
      meds:allMeds,
      statut:statut,
      codeRetrait:codeRetrait,
      offre:offreJson
    };

    if(statut==='valide'){renderValide();}
    else if(statut==='selectionne'){renderRetraitAttente();}
    else if(statut==='repondu'){renderDejaRepondu();}
    else{renderForm();}
  }catch(e){
    el.innerHTML='<div class="error">❌ Erreur chargement : '+escHtml(e.message)+'</div>';
  }
}

function renderForm(){
  STATE='form';
  document.getElementById('hdrSub').textContent='Répondre à l\'appel d\'offre';
  var d=aoData;
  var medsHtml=d.meds.map(function(m,i){
    // Normaliser : m peut être un string ou un objet {nom, dose, poso, duree}
    var nomMed=typeof m==='string'?m:((m.nom||'')+(m.dose?' '+m.dose:'')+(m.poso?' — '+m.poso:'')+(m.duree?' — '+m.duree:''));
    return '<div class="med-row">'+
      '<div class="med-name"><div class="med-num">'+(i+1)+'</div>'+escHtml(nomMed)+'</div>'+
      '<label class="check-total"><input type="checkbox" id="total_'+i+'" onchange="toggleTotal('+i+')"> Médicament disponible en totalité (1 boîte)</label>'+
      '<div class="med-fields-grid">'+
        '<div class="field-group"><div class="field-lbl">Boîtes</div><input class="field-input" id="boites_'+i+'" type="number" min="0" placeholder="0" oninput="calcTotal('+i+')"></div>'+
        '<div class="field-group"><div class="field-lbl">Comprimés</div><input class="field-input" id="comprimes_'+i+'" type="number" min="0" placeholder="0"></div>'+
        '<div class="field-group"><div class="field-lbl">Prix/boîte (FCFA)</div><input class="field-input" id="prix_'+i+'" type="number" min="0" placeholder="0" oninput="calcTotal('+i+')"></div>'+
        '<div class="field-group"><div class="field-lbl">Total (FCFA)</div><input class="field-input total-auto" id="total_fcfa_'+i+'" readonly></div>'+
      '</div>'+
    '</div>';
  }).join('');

  document.getElementById('mainContent').innerHTML=
    '<div class="card">'+
      '<div class="card-hdr">📋 INFORMATIONS PHARMACIE</div>'+
      '<div class="card-body">'+
        '<div class="pharm-field"><label>Nom de la pharmacie</label><input id="pharmNom" type="text" value="'+escHtml(d.pharmNom)+'" placeholder="ex: Pharmacie de la Paix"></div>'+
        '<div class="pharm-field"><label>Téléphone WhatsApp</label><input id="pharmTel" type="tel" value="'+escHtml(d.pharmTel)+'" placeholder="+225 07 XX XX XX XX"></div>'+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-hdr">💊 MÉDICAMENTS DEMANDÉS ('+d.meds.length+')</div>'+
      '<div class="card-body">'+medsHtml+'</div>'+
    '</div>'+
    '<button class="btn-submit" onclick="soumettre()">✅ Soumettre mon offre</button>'+
    '<div style="height:30px;"></div>';
}

function renderDejaRepondu(){
  STATE='confirme';
  document.getElementById('hdrSub').textContent='Offre soumise';
  var d=aoData;
  var offreHtml='';
  if(d.offre&&d.offre.length){
    offreHtml='<div class="card">'+
      '<div class="card-hdr">💊 VOTRE OFFRE</div>'+
      '<div class="card-body">'+
        d.offre.map(function(item){
          return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e5e7eb;">'+
            '<span style="font-size:13px;font-weight:600;">'+(item.disponible?'✅':'❌')+' '+escHtml(item.medicament||'')+'</span>'+
            '<span style="font-size:13px;color:#0A7E6A;font-weight:700;">'+(item.total>0?item.total.toLocaleString('fr-FR')+' FCFA':'—')+'</span>'+
          '</div>';
        }).join('')+
      '</div>'+
    '</div>';
  }
  document.getElementById('mainContent').innerHTML=
    '<div class="success">'+
      '<div class="success-ico">📤</div>'+
      '<div class="success-title">Offre soumise avec succès !</div>'+
      '<div class="success-sub">En attente de la décision du patient.<br>Vous serez contacté si votre offre est retenue.</div>'+
    '</div>'+
    offreHtml+
    '<div style="height:30px;"></div>';
}

function renderRetraitAttente(){
  STATE='retrait_attente';
  var d=aoData;
  document.getElementById('hdrSub').textContent='Retrait client en attente';
  var medsHtml='';
  if(d.meds&&d.meds.length){
    medsHtml='<div class="card">'+
      '<div class="card-hdr">💊 MÉDICAMENTS À PRÉPARER POUR CE CLIENT</div>'+
      '<div class="card-body">'+
        d.meds.map(function(m,i){
          var nomMed=typeof m==='string'?m.trim():((m.nom||'')+(m.dose?' '+m.dose:'')+(m.poso?' — '+m.poso:'')+(m.duree?' — '+m.duree:''));
          return '<div style="padding:8px 0;border-bottom:1px solid #e5e7eb;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;">'+
            '<div class="med-num">'+(i+1)+'</div>'+escHtml(nomMed)+
          '</div>';
        }).join('')+
      '</div>'+
    '</div>';
  }
  document.getElementById('mainContent').innerHTML=
    '<div class="success">'+
      '<div class="success-ico">🎯</div>'+
      '<div class="success-title">Votre offre a été sélectionnée !</div>'+
      '<div class="success-sub">Le patient vient récupérer sa commande.<br>Préparez les médicaments ci-dessous.</div>'+
    '</div>'+
    medsHtml+
    '<div class="retrait-box">'+
      '<div class="retrait-title">🔐 Saisir le code du patient</div>'+
      '<div style="font-size:12px;color:#6B7280;text-align:center;margin-bottom:12px;">Le patient vous communique son code à voix haute.</div>'+
      '<input class="retrait-input" id="codeRetraitInput" type="text" inputmode="numeric" maxlength="6" placeholder="——————" oninput="autoValiderRetrait(this)">'+
      '<div id="retraitErr" style="color:#dc2626;font-size:12px;text-align:center;margin-top:8px;display:none;"></div>'+
    '</div>'+
    '<div style="height:30px;"></div>';
}

function renderValide(){
  STATE='valide';
  document.getElementById('hdrSub').textContent='Commande validée';
  document.getElementById('mainContent').innerHTML=
    '<div class="success">'+
      '<div class="success-ico">✅</div>'+
      '<div class="success-title">Retrait validé !</div>'+
      '<div class="success-sub">La commande a été remise au patient.<br>Cette offre est maintenant clôturée.</div>'+
    '</div>';
}

function toggleTotal(i){
  var checked=document.getElementById('total_'+i).checked;
  if(checked){document.getElementById('boites_'+i).value=1;document.getElementById('comprimes_'+i).value=0;calcTotal(i);}
  else{document.getElementById('boites_'+i).value='';document.getElementById('comprimes_'+i).value='';document.getElementById('total_fcfa_'+i).value='';}
}

function calcTotal(i){
  var boites=parseInt(document.getElementById('boites_'+i).value||'0')||0;
  var prix=parseInt(document.getElementById('prix_'+i).value||'0')||0;
  var el=document.getElementById('total_fcfa_'+i);
  el.value=boites*prix>0?(boites*prix).toLocaleString('fr-FR')+' FCFA':'';
}

async function soumettre(){
  if(!aoData)return;
  var nom=(document.getElementById('pharmNom').value||'').trim();
  var tel=(document.getElementById('pharmTel').value||'').trim();
  if(!nom||!tel){toast('⚠️ Remplissez le nom et téléphone');return;}
  var auMoinsUn=aoData.meds.some(function(m,i){return parseInt(document.getElementById('boites_'+i).value||'0')>0;});
  if(!auMoinsUn){toast('⚠️ Renseignez au moins un médicament');return;}
  var offre=aoData.meds.map(function(m,i){
    var boites=parseInt(document.getElementById('boites_'+i).value||'0')||0;
    var comprimes=parseInt(document.getElementById('comprimes_'+i).value||'0')||0;
    var prix=parseInt(document.getElementById('prix_'+i).value||'0')||0;
    return {medicament:typeof m==='string'?m:((m.nom||'')+(m.dose?' '+m.dose:'')),disponible:boites>0,boites:boites,comprimes:comprimes,prixUnitaire:prix,total:boites*prix};
  });
  var btn=document.querySelector('.btn-submit');
  btn.disabled=true;btn.textContent='⏳ Envoi...';
  try{
    await dbReq('PATCH',{
      table:'appels_offres',
      id:aoData.supabaseId,
      data:{pharmacie_nom:nom,pharmacie_tel:tel,offre_json:offre,statut:'repondu',date_reponse:new Date().toISOString()}
    });
    aoData.offre=offre;aoData.statut='repondu';
    renderDejaRepondu();
  }catch(e){
    btn.disabled=false;btn.textContent='✅ Soumettre mon offre';
    toast('❌ Erreur : '+e.message);
  }
}

function autoValiderRetrait(input){
  var code=(input.value||'').trim().replace(/\s/g,'').replace(/[^\d]/g,'');
  if(code.length===6)validerRetrait();
}

async function validerRetrait(){
  var code=(document.getElementById('codeRetraitInput').value||'').trim().replace(/\s/g,'').replace(/[^\d]/g,'');
  var errEl=document.getElementById('retraitErr');
  if(errEl)errEl.style.display='none';
  if(!/^\d{6}$/.test(code)){if(errEl){errEl.textContent='Code invalide — 6 chiffres requis';errEl.style.display='block';}return;}
  if(aoData.codeRetrait&&code!==aoData.codeRetrait){
    if(errEl){errEl.textContent='❌ Code incorrect — vérifiez avec le patient';errEl.style.display='block';}
    var inp=document.getElementById('codeRetraitInput');
    if(inp){inp.value='';inp.focus();}
    return;
  }
  try{
    await dbReq('PATCH',{table:'appels_offres',id:aoData.supabaseId,data:{statut:'valide',date_validation:new Date().toISOString()}});
    // Annuler les autres offres du même consultation_id
    try{
      var autres=await dbReq('GET',null,'table=appels_offres&filter=consultation_id=eq.'+encodeURIComponent(aoData.consultId));
      var rows=Array.isArray(autres)?autres:(autres.data||[]);
      await Promise.all(rows.filter(function(r){return r.id!==aoData.supabaseId&&r.statut!=='valide';}).map(function(r){
        return dbReq('PATCH',{table:'appels_offres',id:r.id,data:{statut:'annule'}}).catch(function(){});
      }));
    }catch(e){}
    toast('✅ Retrait validé !');
    setTimeout(function(){renderValide();},1500);
  }catch(e){
    if(errEl){errEl.textContent='Erreur : '+e.message;errEl.style.display='block';}
  }
}

init();
</script>
</body>
</html>
